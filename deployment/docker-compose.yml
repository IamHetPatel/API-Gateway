version: '3'
services:
  gateway:
    build: ../gateway
    ports:
      - "3000:3000"
    depends_on:
      - user-service
      - product-service
      - order-service
      - redis

  user-service:
    build: ../microservices/user-service
    ports:
      - "4000:4000"

  product-service:
    build: ../microservices/product-service
    ports:
      - "5001:5001"

  order-service:
    build: ../microservices/order-service
    ports:
      - "6000:6000"

  redis:
    image: redis
    ports:
      - "6379:6379"

  prometheus:
    image: prom/prometheus
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
